name: CD Pipeline

on:
  push:
    tags:
      - 'v*' # Τρέχει μόνο όταν κάνεις tag (π.χ. git tag v1.0)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./infrastructure/Dockerfile # Βεβαιώσου για το path
          push: true
          tags: your-dockerhub-username/fraud-api:latest